<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>White-Label Platform — Interactive Prototype</title>
<!-- Headings use --font-display (Space Grotesk) if available locally/self-hosted; falls back to system sans. No external fetch so the prototype stays self-contained/offline. -->
<style>
/* =====================================================================
   QUIET AUTHORITY — design system (single-file, no external deps)
   Theming via CSS custom properties; the demo HUD mutates --brand etc.
   ===================================================================== */
:root{
  /* brand (Indigo default — overwritten by JS theme/brand picker) */
  --brand:#2E4A8B; --brand-dark:#1E3164; --brand-50:#EBEFF8; --accent:#C9A86A;
  --bg:#F7F8FA; --surface:#FFFFFF; --surface-2:#F1F3F7;
  --border-color:#E3E7EE; --border-strong-color:#CBD2DE;
  --text:#10182A; --text-muted:#5A6478;
  --success:#1F7A4D; --warning:#B5751B; --danger:#B42318;
  /* fixed tints (success/warning/danger constant across themes) */
  --success-tint:#E6F2EC; --warning-tint:#FBF1E3; --danger-tint:#FBEAE8;
  /* fonts */
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-display:"Space Grotesk","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Mono","Segoe UI Mono","Roboto Mono",Menlo,Consolas,monospace;
  /* type scale */
  --fs-display:3.052rem; --fs-h1:2.441rem; --fs-h2:1.953rem; --fs-h3:1.563rem;
  --fs-h4:1.25rem; --fs-body-lg:1.125rem; --fs-body:1rem; --fs-sm:.875rem; --fs-xs:.75rem; --fs-2xs:.6875rem;
  /* weights */
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
  /* spacing */
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-10:40px;--space-12:48px;--space-16:64px;--space-20:80px;--space-24:96px;--space-32:128px;
  /* radius */
  --radius-xs:4px;--radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-pill:999px;
  /* shadows (cool-tinted) */
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);
  --shadow-sm:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.04);
  --shadow-md:0 2px 4px rgba(16,24,40,.05),0 4px 8px rgba(16,24,40,.06);
  --shadow-lg:0 4px 8px rgba(16,24,40,.06),0 12px 24px rgba(16,24,40,.08);
  --shadow-xl:0 8px 16px rgba(16,24,40,.08),0 24px 48px rgba(16,24,40,.12);
  --shadow-focus:0 0 0 3px var(--brand-50),0 0 0 1px var(--brand);
  --overlay-scrim:rgba(16,24,40,.48);
  /* motion */
  --ease-out:cubic-bezier(.16,1,.3,1); --ease-in-out:cubic-bezier(.4,0,.2,1);
  --dur-fast:120ms;--dur-base:180ms;--dur-slow:240ms;--dur-slower:320ms;
  --transition-base:all var(--dur-base) var(--ease-out);
  --transition-colors:color var(--dur-fast) var(--ease-out),background-color var(--dur-fast) var(--ease-out),border-color var(--dur-fast) var(--ease-out),box-shadow var(--dur-fast) var(--ease-out);
  /* layout */
  --container-max:1200px; --sidebar-w:256px; --topnav-h:64px; --appbar-h:60px; --hud-h:48px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-sans); font-size:var(--fs-body); color:var(--text);
  background:var(--bg); line-height:1.6; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.num,.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;letter-spacing:0}
h1,h2,h3,h4,p{margin:0}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit}
img{max-width:100%}
::selection{background:var(--brand-50)}
.eyebrow{font-size:var(--fs-xs);font-weight:var(--fw-medium);letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.eyebrow .seal{color:var(--accent)}
.muted{color:var(--text-muted)}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- demo HUD ---------- */
#demo-hud{
  position:fixed;top:0;left:0;right:0;height:var(--hud-h);z-index:1400;
  display:flex;align-items:center;gap:var(--space-4);padding:0 var(--space-4);
  background:#0C1222;color:#E7EAF2;border-bottom:1px solid #1E2A45;
  font-size:var(--fs-xs);box-shadow:0 2px 8px rgba(0,0,0,.25)
}
#demo-hud .hud-brandmark{display:flex;align-items:center;gap:8px;font-weight:var(--fw-semibold);color:#fff;letter-spacing:.02em;white-space:nowrap}
#demo-hud .hud-brandmark .dot{width:8px;height:8px;border-radius:2px;background:var(--accent)}
#demo-hud .hud-sep{width:1px;height:22px;background:#243154}
#demo-hud .hud-group{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
#demo-hud .hud-label{color:#8C97B5;text-transform:uppercase;letter-spacing:.06em;font-size:var(--fs-2xs);margin-right:2px}
.role-seg{display:inline-flex;background:#161F36;border:1px solid #243154;border-radius:var(--radius-sm);overflow:hidden}
.role-seg button{background:transparent;border:0;color:#AAB4CE;padding:5px 10px;font-size:var(--fs-xs);font-weight:var(--fw-medium);cursor:pointer;transition:var(--transition-colors)}
.role-seg button:hover{color:#fff;background:#1E2A45}
.role-seg button.active{background:var(--brand);color:#fff}
.brand-dots{display:flex;gap:5px}
.brand-dots button{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:transform var(--dur-fast)}
.brand-dots button:hover{transform:scale(1.15)}
.brand-dots button.active{border-color:#fff}
#demo-hud input[type=text]{background:#161F36;border:1px solid #243154;color:#fff;border-radius:var(--radius-sm);padding:5px 8px;font-size:var(--fs-xs);width:130px;font-family:inherit}
#demo-hud input[type=color]{width:26px;height:26px;border:1px solid #243154;border-radius:var(--radius-sm);background:#161F36;cursor:pointer;padding:2px}
#demo-hud .hud-btn{background:#1E2A45;border:1px solid #2C3B5E;color:#cdd6ea;border-radius:var(--radius-sm);padding:5px 10px;font-size:var(--fs-xs);cursor:pointer;white-space:nowrap;transition:var(--transition-colors)}
#demo-hud .hud-btn:hover{background:#28375a;color:#fff}
#demo-hud .hud-right{margin-left:auto;display:flex;align-items:center;gap:var(--space-3)}
.tier-seg{display:inline-flex;background:#161F36;border:1px solid #243154;border-radius:var(--radius-sm);overflow:hidden}
.tier-seg button{background:transparent;border:0;color:#AAB4CE;padding:5px 9px;font-size:var(--fs-2xs);font-weight:var(--fw-medium);cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.tier-seg button.active{background:var(--accent);color:#1A1306}
.hud-hint{color:#8C97B5;font-size:var(--fs-2xs);font-style:italic}
@media(max-width:1100px){#demo-hud{overflow-x:auto;gap:var(--space-3)} #demo-hud .hud-hint{display:none}}

#app{padding-top:var(--hud-h)}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:0 16px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:var(--fw-medium);letter-spacing:.005em;border:1px solid transparent;cursor:pointer;transition:var(--transition-colors),transform var(--dur-fast);user-select:none;white-space:nowrap}
.btn:focus-visible{outline:none;box-shadow:var(--shadow-focus)}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.btn-primary:active{transform:translateY(1px)}
.btn-accent{background:var(--accent);color:#231A08;border-color:var(--accent)}
.btn-accent:hover{filter:brightness(.94)}
.btn-secondary{background:var(--surface);color:var(--text);border-color:var(--border-strong-color)}
.btn-secondary:hover{background:var(--surface-2);border-color:var(--text-muted)}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{filter:brightness(.92)}
.btn-sm{height:32px;padding:0 12px;font-size:var(--fs-xs)}
.btn-lg{height:48px;padding:0 22px;font-size:var(--fs-body)}
.btn[disabled]{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn-icon{width:40px;height:40px;padding:0}
.btn-block{width:100%}

/* ---------- icons ---------- */
.ic{width:20px;height:20px;flex:none;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.ic-24{width:24px;height:24px}
.ic-18{width:18px;height:18px}
.ic-16{width:16px;height:16px}

/* ---------- public nav ---------- */
.pubnav{position:sticky;top:var(--hud-h);z-index:200;background:var(--surface);border-bottom:1px solid var(--border-color)}
.pubnav-inner{max-width:var(--container-max);margin:0 auto;height:var(--topnav-h);display:flex;align-items:center;gap:var(--space-8);padding:0 var(--space-6)}
.wordmark{display:flex;align-items:center;gap:10px;font-weight:var(--fw-bold);letter-spacing:-.02em;font-size:var(--fs-h4);color:var(--text);cursor:pointer}
.wordmark .seal{width:3px;height:22px;background:var(--accent);border-radius:2px}
.wordmark .mk{width:26px;height:26px;border-radius:6px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700}
.pubnav-links{display:flex;align-items:center;gap:28px;margin-left:var(--space-4)}
.pubnav-links a{font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--text-muted);cursor:pointer;position:relative;padding:4px 0;transition:var(--transition-colors)}
.pubnav-links a:hover{color:var(--text)}
.pubnav-links a::after{content:"";position:absolute;left:0;bottom:-2px;height:2px;width:0;background:var(--brand);transition:width var(--dur-base) var(--ease-out)}
.pubnav-links a:hover::after{width:100%}
.pubnav-right{margin-left:auto;display:flex;align-items:center;gap:var(--space-3)}
@media(max-width:880px){.pubnav-links{display:none}}

/* ---------- public sections ---------- */
.section{padding:var(--space-24) var(--space-6)}
.section-sm{padding:var(--space-16) var(--space-6)}
.container{max-width:var(--container-max);margin:0 auto}
.container-prose{max-width:760px;margin:0 auto}
.hero{padding:var(--space-24) var(--space-6) var(--space-20)}
.hero h1{font-size:var(--fs-display);font-weight:var(--fw-bold);letter-spacing:-.03em;line-height:1.08;margin:var(--space-5) 0;max-width:14ch}
.hero .lead{font-size:var(--fs-body-lg);color:var(--text-muted);max-width:54ch;line-height:1.55}
.hero-cta{display:flex;gap:var(--space-3);margin-top:var(--space-8);flex-wrap:wrap}
.hero-seal{display:inline-block;width:40px;height:3px;background:var(--accent);border-radius:2px;margin-bottom:var(--space-2)}
.sec-head{max-width:62ch;margin-bottom:var(--space-10)}
.sec-head h2{font-size:var(--fs-h1);font-weight:var(--fw-bold);letter-spacing:-.025em;line-height:1.15;margin-top:var(--space-3)}
.sec-head p{color:var(--text-muted);font-size:var(--fs-body-lg);margin-top:var(--space-3)}

.grid{display:grid;gap:var(--space-6)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* value strip / steps */
.step-card{position:relative;padding:var(--space-6);border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface)}
.step-num{font-family:var(--font-mono);font-size:var(--fs-2xs);color:var(--accent);font-weight:var(--fw-semibold);letter-spacing:.1em}
.step-card h3{font-size:var(--fs-h4);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin:var(--space-3) 0 var(--space-2)}
.step-card p{color:var(--text-muted);font-size:var(--fs-sm)}

/* service cards */
.svc-card{padding:var(--space-6);border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface);cursor:pointer;transition:var(--transition-base)}
.svc-card:hover{border-color:var(--border-strong-color);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.svc-ic{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--brand-50);color:var(--brand);display:grid;place-items:center;margin-bottom:var(--space-4)}
.svc-card h3{font-size:var(--fs-h4);font-weight:var(--fw-semibold);letter-spacing:-.01em}
.svc-card .price{font-family:var(--font-mono);font-size:var(--fs-sm);color:var(--text);font-weight:var(--fw-semibold);margin-top:var(--space-3)}
.svc-card .price span{color:var(--text-muted);font-weight:400}
.svc-card p{color:var(--text-muted);font-size:var(--fs-sm);margin-top:var(--space-2)}

/* social proof */
.proof-bar{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-8);padding:var(--space-8);border:1px solid var(--border-color);border-radius:var(--radius-lg);background:var(--surface)}
.proof-stat .v{font-family:var(--font-mono);font-size:var(--fs-h2);font-weight:var(--fw-semibold);letter-spacing:-.01em}
.proof-stat .l{font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.flags{display:flex;gap:4px;flex-wrap:wrap;font-size:20px;line-height:1}
.stars{color:var(--accent);font-size:var(--fs-body)}
.testi{padding:var(--space-6);border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface)}
.testi p{font-size:var(--fs-body);line-height:1.6}
.testi .who{display:flex;align-items:center;gap:10px;margin-top:var(--space-4)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:var(--fs-sm);font-weight:var(--fw-semibold);flex:none}
.avatar-sq{border-radius:var(--radius-sm)}
.avatar-lg{width:56px;height:56px;font-size:var(--fs-h4)}

/* CTA band */
.cta-band{background:var(--brand);color:#fff;border-radius:var(--radius-xl);padding:var(--space-16);text-align:center}
.cta-band h2{font-size:var(--fs-h1);font-weight:var(--fw-bold);letter-spacing:-.025em}
.cta-band p{color:rgba(255,255,255,.8);font-size:var(--fs-body-lg);margin-top:var(--space-3)}
.cta-band .btn-secondary{margin-top:var(--space-8);background:#fff;color:var(--brand-dark);border-color:#fff}

/* footer */
.pubfooter{background:#0C1222;color:#AAB4CE;padding:var(--space-16) var(--space-6) var(--space-8)}
.pubfooter .cols{max-width:var(--container-max);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:var(--space-8)}
.pubfooter h4{color:#fff;font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--space-4)}
.pubfooter a{display:block;color:#AAB4CE;font-size:var(--fs-sm);padding:5px 0;cursor:pointer}
.pubfooter a:hover{color:#fff}
.pubfooter .wordmark{color:#fff}
.pubfooter .legal{max-width:var(--container-max);margin:var(--space-12) auto 0;padding-top:var(--space-6);border-top:1px solid #1E2A45;font-size:var(--fs-xs);display:flex;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
@media(max-width:780px){.pubfooter .cols{grid-template-columns:1fr 1fr}}

/* ---------- cards / panels ---------- */
.card{background:var(--surface);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:var(--space-6)}
.card-pad-lg{padding:var(--space-8)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding-bottom:var(--space-4);margin-bottom:var(--space-4);border-bottom:1px solid var(--border-color)}
.card-head h3{font-size:var(--fs-h4);font-weight:var(--fw-semibold);letter-spacing:-.01em}
.card-title{font-size:var(--fs-h4);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin-bottom:var(--space-4)}

/* ---------- forms ---------- */
.field{margin-bottom:var(--space-4)}
.field label,.flabel{display:block;font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--text);margin-bottom:6px}
.req{color:var(--danger)}
.input,.select,.textarea{width:100%;height:40px;background:var(--surface);border:1px solid var(--border-strong-color);border-radius:var(--radius-sm);padding:10px 12px;font-size:var(--fs-sm);color:var(--text);font-family:inherit;transition:var(--transition-colors)}
.textarea{height:auto;min-height:96px;resize:vertical;line-height:1.5}
.input::placeholder,.textarea::placeholder{color:var(--text-muted)}
.input:hover,.select:hover,.textarea:hover{border-color:var(--text-muted)}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--brand);box-shadow:var(--shadow-focus)}
.select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%235A6478' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:36px}
.help{font-size:var(--fs-xs);color:var(--text-muted);margin-top:6px}
.toggle-group{display:inline-flex;border:1px solid var(--border-strong-color);border-radius:var(--radius-sm);overflow:hidden}
.toggle-group button{background:var(--surface);border:0;border-right:1px solid var(--border-strong-color);padding:9px 14px;font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--text-muted);cursor:pointer;transition:var(--transition-colors)}
.toggle-group button:last-child{border-right:0}
.toggle-group button:hover{color:var(--text);background:var(--surface-2)}
.toggle-group button.active{background:var(--brand);color:#fff}
.check{display:flex;align-items:flex-start;gap:10px;font-size:var(--fs-sm);cursor:pointer}
.check input{margin-top:3px;width:16px;height:16px;accent-color:var(--brand)}

/* ---------- badges ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-pill);padding:3px 10px;font-size:var(--fs-2xs);font-weight:var(--fw-semibold);letter-spacing:.03em;text-transform:uppercase}
.badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-new{background:var(--brand-50);color:var(--brand)}
.badge-pending,.badge-under-review,.badge-submitted{background:var(--warning-tint);color:var(--warning)}
.badge-approved,.badge-verified,.badge-active{background:var(--success-tint);color:var(--success)}
.badge-rejected{background:var(--danger-tint);color:var(--danger)}
.badge-draft,.badge-neutral{background:var(--surface-2);color:var(--text-muted)}
.badge-live .bdot{animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 5px transparent}100%{box-shadow:0 0 0 0 transparent}}
.tag{display:inline-flex;align-items:center;background:var(--surface-2);color:var(--text-muted);border-radius:var(--radius-xs);padding:2px 8px;font-size:var(--fs-2xs);font-weight:var(--fw-medium)}
.completeness{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-2xs);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:.03em}
.completeness .bars{display:inline-flex;gap:2px}
.completeness .bars i{width:5px;height:11px;border-radius:1px;background:var(--border-strong-color)}
.completeness.low .bars i:nth-child(1){background:var(--danger)}
.completeness.med .bars i:nth-child(1),.completeness.med .bars i:nth-child(2){background:var(--warning)}
.completeness.high .bars i{background:var(--success)}
.completeness.low{color:var(--danger)} .completeness.med{color:var(--warning)} .completeness.high{color:var(--success)}

/* ---------- KPI ---------- */
.kpi{background:var(--surface);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:var(--space-5)}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between}
.kpi-tile{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--brand-50);color:var(--brand);display:grid;place-items:center}
.kpi-value{font-family:var(--font-mono);font-size:var(--fs-h2);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin-top:var(--space-2);font-variant-numeric:tabular-nums}
.kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:var(--fs-xs);font-weight:var(--fw-medium);margin-top:var(--space-1)}
.kpi-delta.up{color:var(--success)} .kpi-delta.down{color:var(--danger)}

/* ---------- tables ---------- */
.tbl-wrap{border:1px solid var(--border-color);border-radius:var(--radius-md);overflow:hidden;background:var(--surface)}
.tbl-toolbar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4);border-bottom:1px solid var(--border-color);flex-wrap:wrap}
table.tbl{width:100%;border-collapse:collapse}
table.tbl thead th{background:var(--surface-2);text-align:left;font-size:var(--fs-2xs);font-weight:var(--fw-medium);letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);padding:12px 16px;white-space:nowrap}
table.tbl tbody td{padding:12px 16px;font-size:var(--fs-sm);border-top:1px solid var(--border-color);vertical-align:middle}
table.tbl tbody tr{cursor:pointer;transition:background var(--dur-fast)}
table.tbl tbody tr:hover{background:var(--brand-50)}
table.tbl .t-num{text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.cell-entity{display:flex;align-items:center;gap:10px}
.cell-entity .sub{font-size:var(--fs-2xs);color:var(--text-muted)}
.tbl-foot{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-top:1px solid var(--border-color);font-size:var(--fs-xs);color:var(--text-muted)}

/* filter chips */
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--border-strong-color);background:var(--surface);border-radius:var(--radius-pill);padding:6px 12px;font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--text-muted);cursor:pointer;transition:var(--transition-colors)}
.chip:hover{border-color:var(--text-muted);color:var(--text)}
.chip.active{background:var(--text);color:var(--surface);border-color:var(--text)}

/* ---------- stepper / progress ---------- */
.progress{height:6px;background:var(--surface-2);border-radius:var(--radius-pill);overflow:hidden}
.progress > i{display:block;height:100%;background:var(--brand);border-radius:var(--radius-pill);transition:width var(--dur-slow) var(--ease-out)}
.steprow{display:flex;align-items:center;justify-content:space-between;font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:8px}

/* timeline (vertical, status) */
.timeline{position:relative;padding-left:var(--space-6)}
.timeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:1px;background:var(--border-color)}
.tl-item{position:relative;padding-bottom:var(--space-5)}
.tl-item:last-child{padding-bottom:0}
.tl-item .node{position:absolute;left:calc(-1 * var(--space-6) + 4px);top:3px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--border-strong-color)}
.tl-item.done .node{background:var(--brand);border-color:var(--brand)}
.tl-item.active .node{background:var(--surface);border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-50)}
.tl-item.rejected .node{background:var(--danger);border-color:var(--danger)}
.tl-item .tl-title{font-size:var(--fs-sm);font-weight:var(--fw-medium)}
.tl-item .tl-meta{font-size:var(--fs-2xs);color:var(--text-muted);font-variant-numeric:tabular-nums}

/* ---------- app shell ---------- */
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:calc(100vh - var(--hud-h))}
.sidebar{background:var(--surface-2);border-right:1px solid var(--border-color);display:flex;flex-direction:column;position:sticky;top:var(--hud-h);height:calc(100vh - var(--hud-h))}
.sb-org{display:flex;align-items:center;gap:10px;padding:var(--space-4);border-bottom:1px solid var(--border-color)}
.sb-org .mk{width:30px;height:30px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px;flex:none}
.sb-org .nm{font-weight:var(--fw-semibold);font-size:var(--fs-sm);letter-spacing:-.01em;line-height:1.2}
.sb-org .rl{font-size:var(--fs-2xs);color:var(--text-muted)}
.sb-nav{padding:var(--space-4) var(--space-3);flex:1;overflow:auto}
.sb-group{font-size:var(--fs-2xs);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:var(--fw-medium);padding:var(--space-3) var(--space-2) var(--space-2)}
.sb-item{position:relative;display:flex;align-items:center;gap:10px;height:40px;padding:0 12px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--text);cursor:pointer;transition:var(--transition-colors);margin-bottom:2px}
.sb-item .ic{color:var(--text-muted)}
.sb-item:hover{background:var(--brand-50)}
.sb-item:hover .ic{color:var(--brand)}
.sb-item.active{background:var(--brand-50);color:var(--brand);font-weight:var(--fw-semibold)}
.sb-item.active .ic{color:var(--brand)}
.sb-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--brand);border-radius:0 2px 2px 0}
.sb-item.locked{opacity:.45;cursor:not-allowed}
.sb-item .lockic{margin-left:auto}
.sb-foot{border-top:1px solid var(--border-color);padding:var(--space-3)}
.appbar{height:var(--appbar-h);background:var(--surface);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:var(--space-4);padding:0 var(--space-6);position:sticky;top:var(--hud-h);z-index:50}
.appbar h1{font-size:var(--fs-h4);font-weight:var(--fw-semibold);letter-spacing:-.01em}
.appbar .bc{font-size:var(--fs-xs);color:var(--text-muted)}
.appbar-right{margin-left:auto;display:flex;align-items:center;gap:var(--space-4)}
.searchbox{position:relative}
.searchbox .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.searchbox input{height:38px;width:240px;border:1px solid var(--border-strong-color);border-radius:var(--radius-sm);padding:0 12px 0 34px;font-size:var(--fs-sm);background:var(--surface);font-family:inherit;transition:width var(--dur-base) var(--ease-out)}
.searchbox input:focus{outline:none;width:300px;border-color:var(--brand);box-shadow:var(--shadow-focus)}
.bell{position:relative;color:var(--text-muted);cursor:pointer}
.bell .dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:1.5px solid var(--surface)}
.appmain{padding:var(--space-8);max-width:1200px}
.twocol{display:grid;grid-template-columns:1fr 340px;gap:var(--space-6);align-items:start}
.twocol-wide{grid-template-columns:2fr 1fr}
@media(max-width:1000px){.shell{grid-template-columns:1fr}.sidebar{display:none}.twocol,.twocol-wide{grid-template-columns:1fr}}

.page-head{margin-bottom:var(--space-6)}
.page-head h2{font-size:var(--fs-h3);font-weight:var(--fw-bold);letter-spacing:-.02em}
.page-head p{color:var(--text-muted);font-size:var(--fs-sm);margin-top:4px}

/* locked card */
.lock-card{border:1px dashed var(--border-strong-color);border-radius:var(--radius-md);background:var(--surface-2);padding:var(--space-8);text-align:center;color:var(--text-muted)}
.lock-card .ic{color:var(--text-muted);margin-bottom:var(--space-3)}
.lock-card h3{color:var(--text);font-size:var(--fs-h4);font-weight:var(--fw-semibold);margin-bottom:var(--space-2)}

/* dropzone */
.dropzone{border:2px dashed var(--border-strong-color);border-radius:var(--radius-md);background:color-mix(in srgb,var(--surface-2) 50%,transparent);padding:var(--space-8);text-align:center;cursor:pointer;transition:var(--transition-base)}
.dropzone:hover{border-color:var(--brand);background:var(--brand-50)}
.dropzone .dz-ic{width:48px;height:48px;border-radius:50%;background:var(--brand-50);color:var(--brand);display:grid;place-items:center;margin:0 auto var(--space-3)}
.file-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border-color);border-radius:var(--radius-sm);background:var(--surface);margin-top:10px}
.file-row .fic{width:32px;height:32px;border-radius:var(--radius-xs);background:var(--brand-50);color:var(--brand);display:grid;place-items:center;flex:none}
.file-row .fname{font-size:var(--fs-sm);font-weight:var(--fw-medium)}
.file-row .fmeta{font-size:var(--fs-2xs);color:var(--text-muted);font-family:var(--font-mono)}
.file-row .fx{margin-left:auto;display:flex;gap:8px;align-items:center}

/* messages */
.thread{display:flex;flex-direction:column;gap:var(--space-3);padding:var(--space-2)}
.bubble{max-width:72%;padding:10px 14px;border-radius:var(--radius-md);font-size:var(--fs-sm);line-height:1.5}
.bubble .bm{font-size:var(--fs-2xs);margin-top:5px;opacity:.7;font-variant-numeric:tabular-nums}
.bubble.them{align-self:flex-start;background:var(--surface-2);color:var(--text);border-bottom-left-radius:3px}
.bubble.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:3px}
.composer{display:flex;gap:10px;margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--border-color)}
.composer textarea{flex:1;min-height:44px;max-height:120px}

/* empty state */
.empty{max-width:360px;margin:0 auto;text-align:center;padding:var(--space-12) 0}
.empty .ec{width:72px;height:72px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;margin:0 auto var(--space-4)}
.empty .ec .ic{width:32px;height:32px;color:var(--text-muted);stroke-width:1.5}
.empty h3{font-size:var(--fs-h4);font-weight:var(--fw-semibold);margin-bottom:var(--space-2)}
.empty p{color:var(--text-muted);font-size:var(--fs-sm);margin-bottom:var(--space-4)}

/* pricing */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-6);align-items:start}
@media(max-width:900px){.price-grid{grid-template-columns:1fr}}
.price-card{border:1px solid var(--border-color);border-radius:var(--radius-lg);background:var(--surface);padding:var(--space-8);position:relative}
.price-card.feat{border-color:var(--brand);box-shadow:var(--shadow-lg)}
.price-card.feat::before{content:"Most popular";position:absolute;top:-12px;left:var(--space-8);background:var(--brand);color:#fff;font-size:var(--fs-2xs);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:.05em;padding:4px 12px;border-radius:var(--radius-pill)}
.price-card .tier{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:var(--fw-medium)}
.price-card .amt{font-family:var(--font-mono);font-size:var(--fs-h1);font-weight:var(--fw-bold);letter-spacing:-.02em;margin:var(--space-3) 0 0}
.price-card .amt span{font-size:var(--fs-sm);color:var(--text-muted);font-weight:400;font-family:var(--font-sans)}
.price-card ul{list-style:none;padding:0;margin:var(--space-6) 0}
.price-card li{display:flex;gap:10px;align-items:flex-start;font-size:var(--fs-sm);padding:7px 0;color:var(--text)}
.price-card li .ic{color:var(--success);margin-top:2px;flex:none}
.price-card li.off{color:var(--text-muted)}
.price-card li.off .ic{color:var(--border-strong-color)}

/* comparison / calculator tools */
.tool-wrap{display:grid;grid-template-columns:1fr;gap:var(--space-6)}
.jchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-5)}
.jchip{border:1px solid var(--border-strong-color);background:var(--surface);border-radius:var(--radius-pill);padding:6px 14px;font-size:var(--fs-sm);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:var(--transition-colors)}
.jchip.on{background:var(--brand-50);border-color:var(--brand);color:var(--brand);font-weight:var(--fw-medium)}
.jchip.dim{opacity:.6}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-8)}
@media(max-width:780px){.calc-grid{grid-template-columns:1fr}}
.calc-result{background:var(--brand);color:#fff;border-radius:var(--radius-lg);padding:var(--space-8)}
.calc-result .big{font-family:var(--font-mono);font-size:var(--fs-display);font-weight:var(--fw-bold);letter-spacing:-.02em;line-height:1}
.calc-result .lbl{color:rgba(255,255,255,.75);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.05em}
.calc-row{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,.18);font-size:var(--fs-sm)}
.calc-row .num{color:#fff}
.gated{position:relative}
.gated.locked .blurme{filter:blur(7px);pointer-events:none;user-select:none}
.gate-over{position:absolute;inset:0;display:grid;place-items:center;padding:var(--space-6)}
.gate-card{background:var(--surface);border:1px solid var(--border-color);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:var(--space-6);max-width:340px;text-align:center}

/* accordion (faq) */
.acc{border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface);overflow:hidden}
.acc-item{border-bottom:1px solid var(--border-color)}
.acc-item:last-child{border-bottom:0}
.acc-q{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding:var(--space-5);cursor:pointer;font-weight:var(--fw-medium);font-size:var(--fs-body)}
.acc-q .ic{color:var(--text-muted);transition:transform var(--dur-base)}
.acc-item.open .acc-q .ic{transform:rotate(180deg)}
.acc-a{max-height:0;overflow:hidden;transition:max-height var(--dur-slow) var(--ease-out)}
.acc-a .inner{padding:0 var(--space-5) var(--space-5);color:var(--text-muted);font-size:var(--fs-sm);line-height:1.6}

/* auth */
.auth-wrap{min-height:calc(100vh - var(--hud-h));display:grid;place-items:center;padding:var(--space-12) var(--space-6);background:var(--bg)}
.auth-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border-color);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:var(--space-8)}
.auth-tabs{display:flex;gap:var(--space-6);border-bottom:1px solid var(--border-color);margin-bottom:var(--space-6)}
.auth-tabs button{background:0;border:0;padding:0 0 var(--space-3);font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--text-muted);cursor:pointer;position:relative}
.auth-tabs button.active{color:var(--text)}
.auth-tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--brand)}
.divider{display:flex;align-items:center;gap:var(--space-3);color:var(--text-muted);font-size:var(--fs-xs);margin:var(--space-5) 0}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border-color)}

/* intake shell */
.intake-top{background:var(--surface);border-bottom:1px solid var(--border-color);position:sticky;top:var(--hud-h);z-index:50}
.intake-top-inner{max-width:820px;margin:0 auto;padding:var(--space-4) var(--space-6)}
.intake-wrap{max-width:820px;margin:0 auto;padding:var(--space-10) var(--space-6) var(--space-20)}
.intake-foot{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border-color);padding:var(--space-4) var(--space-6)}
.intake-foot-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
.intake-h{font-size:var(--fs-h2);font-weight:var(--fw-bold);letter-spacing:-.02em;margin-bottom:var(--space-2)}
.select-card{border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface);padding:var(--space-5);cursor:pointer;display:flex;gap:var(--space-4);align-items:flex-start;transition:var(--transition-base)}
.select-card:hover{border-color:var(--border-strong-color);box-shadow:var(--shadow-sm)}
.select-card.sel{border-color:var(--brand);box-shadow:var(--shadow-focus)}
.select-card .chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong-color);display:grid;place-items:center;margin-left:auto;flex:none;color:transparent}
.select-card.sel .chk{background:var(--brand);border-color:var(--brand);color:#fff}

/* toast */
#toasts{position:fixed;top:calc(var(--hud-h) + 12px);right:16px;z-index:1300;display:flex;flex-direction:column;gap:12px;max-width:420px}
.toast{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--border-color);border-left:3px solid var(--brand);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:14px 16px;min-width:320px;animation:toastin var(--dur-slow) var(--ease-out)}
.toast.success{border-left-color:var(--success)} .toast.success .ic{color:var(--success)}
.toast.error{border-left-color:var(--danger)} .toast.error .ic{color:var(--danger)}
.toast.info .ic{color:var(--brand)}
.toast .tt{font-size:var(--fs-sm);font-weight:var(--fw-semibold)}
.toast .tb{font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px}
@keyframes toastin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

/* modal */
#modal-root:empty{display:none}
.scrim{position:fixed;inset:0;background:var(--overlay-scrim);backdrop-filter:blur(2px);z-index:1200;display:grid;place-items:center;padding:var(--space-6);animation:fade var(--dur-base)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);max-width:560px;width:100%;max-height:90vh;overflow:auto;animation:modalin var(--dur-slow) var(--ease-out)}
@keyframes modalin{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:var(--space-6);border-bottom:1px solid var(--border-color)}
.modal-head h3{font-size:var(--fs-h4);font-weight:var(--fw-semibold);letter-spacing:-.01em}
.modal-body{padding:var(--space-6)}
.modal-foot{display:flex;justify-content:flex-end;gap:12px;padding:var(--space-5) var(--space-6);border-top:1px solid var(--border-color)}

/* misc utilities */
.row{display:flex;align-items:center;gap:var(--space-3)}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
.stack{display:flex;flex-direction:column}
.gap-2{gap:var(--space-2)}.gap-3{gap:var(--space-3)}.gap-4{gap:var(--space-4)}.gap-6{gap:var(--space-6)}
.mt-2{margin-top:var(--space-2)}.mt-3{margin-top:var(--space-3)}.mt-4{margin-top:var(--space-4)}.mt-6{margin-top:var(--space-6)}.mt-8{margin-top:var(--space-8)}
.mb-2{margin-bottom:var(--space-2)}.mb-4{margin-bottom:var(--space-4)}.mb-6{margin-bottom:var(--space-6)}
.wrap{flex-wrap:wrap}.grow{flex:1}.right{margin-left:auto}.center{text-align:center}
.dl{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:var(--fs-sm)}
.dl dt{color:var(--text-muted)} .dl dd{margin:0;font-weight:var(--fw-medium)}
.hr{height:1px;background:var(--border-color);border:0;margin:var(--space-5) 0}
.note{background:var(--brand-50);border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);border-radius:var(--radius-sm);padding:12px 14px;font-size:var(--fs-xs);color:var(--text);display:flex;gap:10px;align-items:flex-start}
.note .ic{color:var(--brand);flex:none}
/* ---- ownership / org-chart (UBO structure map) ---- */
.orgroot{display:flex;align-items:center;gap:14px;padding:var(--space-5);border:1px solid var(--brand);border-radius:var(--radius-md);background:var(--brand-50);margin-bottom:var(--space-6)}
.orgroot .mk{width:46px;height:46px;border-radius:var(--radius-sm);background:var(--brand);color:#fff;display:grid;place-items:center;flex:none}
.orgtree{padding-left:var(--space-2)}
.branch{position:relative;padding-left:26px}
.onode{position:relative;margin-top:var(--space-3)}
.branch > .onode::before{content:"";position:absolute;left:-16px;top:-14px;width:1.5px;background:var(--border-strong-color);height:calc(100% + 14px)}
.branch > .onode.last::before{height:40px}
.branch > .onode::after{content:"";position:absolute;left:-16px;top:26px;width:16px;height:1.5px;background:var(--border-strong-color)}
.ocard{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border-color);border-radius:var(--radius-sm);background:var(--surface);transition:var(--transition-base)}
.ocard:hover{border-color:var(--border-strong-color);box-shadow:var(--shadow-sm)}
.ocard.ubo{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.ocard .grow{min-width:0}
.onode-ic{width:36px;height:36px;border-radius:var(--radius-sm);display:grid;place-items:center;flex:none}
.onode-ic.person{background:var(--brand-50);color:var(--brand)}
.onode-ic.entity{background:var(--surface-2);color:var(--text-muted)}
.ocard .opct{font-family:var(--font-mono);font-weight:var(--fw-semibold);font-variant-numeric:tabular-nums;text-align:right}
.ocard .oeff{font-family:var(--font-mono);font-size:var(--fs-2xs);color:var(--text-muted);white-space:nowrap}
.ubo-tag{background:var(--accent);color:#231A08;border-radius:var(--radius-xs);padding:2px 7px;font-size:var(--fs-2xs);font-weight:var(--fw-bold);letter-spacing:.04em;text-transform:uppercase}
.ocard-badges{display:flex;gap:6px;align-items:center;flex:none;flex-wrap:wrap;justify-content:flex-end;max-width:200px}
@media(max-width:760px){.ocard{flex-wrap:wrap}.ocard-badges{max-width:none;justify-content:flex-start}}
/* ===== Binderr-style compliance screens ===== */
/* admin-compliance-hub */
/* ---- compliance hub: suite tool cards (theme-driven, mirrors .svc-card) ---- */
.suite-card{display:flex;flex-direction:column;padding:var(--space-5);border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface);cursor:pointer;transition:var(--transition-base)}
.suite-card:hover{border-color:var(--border-strong-color);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.suite-card:hover .ic{color:var(--brand)}
.suite-card .suite-name{font-size:var(--fs-body);font-weight:var(--fw-semibold);letter-spacing:-.01em}
.suite-card .suite-stat{font-size:var(--fs-2xs);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
.suite-card .row-between .ic{color:var(--text-muted)}
.suite-card.locked{opacity:.7;cursor:pointer;background:var(--surface-2);border-style:dashed}
.suite-card.locked:hover{opacity:1;border-color:var(--brand)}
/* admin-ai-screening */
/* ---- AI screening: noise-reduction flow + match score (theme-driven) ---- */
.ai-flow{display:flex;align-items:center;gap:var(--space-6);flex-wrap:wrap}
.ai-flow-stat{text-align:center}
.ai-flow-big{font-size:var(--fs-display);font-weight:var(--fw-bold);line-height:1}
.ai-flow-arrow{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--brand);flex:1;min-width:120px}
.ai-flow-arrow .ic{color:var(--brand)}
.ai-score{font-size:var(--fs-h2);font-weight:var(--fw-semibold);color:var(--brand);line-height:1}
.ai-match{border-left:3px solid var(--brand)}
@media(max-width:620px){.ai-flow{justify-content:space-between}.ai-flow-arrow{order:0;transform:rotate(90deg);min-width:0}}
/* admin-kyc-verification */
/* ---- KYC / ID-verification metric rows (theme-driven; reuses .progress) ---- */
.kyc-metric{margin-bottom:var(--space-1)}
/* admin-client-risk */
/* ---- Client risk assessment (theme-driven; no hardcoded brand colours) ---- */
.risk-dist{display:flex;height:14px;border-radius:var(--radius-pill);overflow:hidden;background:var(--surface-2)}
.risk-dist i{display:block;height:100%}
.risk-score{font-family:var(--font-mono);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums}
.risk-low{color:var(--success)} .risk-medium{color:var(--warning)} .risk-high{color:var(--danger)}
table.tbl tbody tr.risk-row-on{background:var(--brand-50)}
table.tbl tbody tr.risk-row-on td:first-child{box-shadow:inset 3px 0 0 var(--brand)}
.risk-gauge{display:flex;align-items:center;gap:var(--space-4)}
.risk-gauge-num{font-family:var(--font-mono);font-size:var(--fs-h1);font-weight:var(--fw-bold);letter-spacing:-.02em;line-height:1;flex:none}
.risk-gauge-num span{font-size:var(--fs-sm);color:var(--text-muted);font-weight:var(--fw-regular)}
.risk-driver{padding:var(--space-3) 0;border-bottom:1px solid var(--border-color)}
.risk-driver:last-child{border-bottom:0}
/* admin-integrations */
/* ---- admin-integrations: connector grid + API key row (theme-driven) ---- */
.conn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4)}
@media(max-width:760px){.conn-grid{grid-template-columns:1fr}}
.conn-card{display:flex;flex-direction:column;gap:var(--space-4);justify-content:space-between;padding:var(--space-5);border:1px solid var(--border-color);border-radius:var(--radius-md);background:var(--surface);transition:var(--transition-base)}
.conn-card:hover{border-color:var(--border-strong-color);box-shadow:var(--shadow-sm)}
.conn-logo{width:40px;height:40px;background:var(--brand-50);color:var(--brand)}
.conn-foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding-top:var(--space-4);border-top:1px solid var(--border-color)}
.apikey-row{display:flex;align-items:center;gap:var(--space-2);border:1px solid var(--border-strong-color);border-radius:var(--radius-sm);background:var(--surface-2);padding:6px 8px 6px 12px}
.apikey-val{font-size:var(--fs-sm);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* public-terms */
/* ---- public Terms of Service (long-form legal prose) ---- */
/* No existing rule covers long-form legal typography; all values are theme-driven. */
.legal-doc{border-top:1px solid var(--border-color)}
.legal-sec{padding:var(--space-8) 0;border-bottom:1px solid var(--border-color)}
.legal-sec:last-child{border-bottom:0}
.legal-sec h2{font-size:var(--fs-h3);font-weight:var(--fw-semibold);letter-spacing:-.015em;display:flex;align-items:baseline;gap:var(--space-3);margin-bottom:var(--space-4)}
.legal-num{font-family:var(--font-mono);font-size:var(--fs-sm);font-weight:var(--fw-semibold);color:var(--brand);letter-spacing:.04em;flex:none}
.legal-sec h3{font-size:var(--fs-body);font-weight:var(--fw-semibold);margin:var(--space-5) 0 var(--space-2)}
.legal-sec p{color:var(--text-muted);line-height:1.7}
.legal-sec p + p{margin-top:var(--space-3)}
.legal-list{list-style:none;margin:var(--space-3) 0 0;padding:0}
.legal-list li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;color:var(--text-muted);font-size:var(--fs-sm);line-height:1.6}
.legal-list li .ic{color:var(--success);margin-top:3px;flex:none}
/* ===== Sardine-inspired client polish (white-label & theme-driven) ===== */
h1,h2,h3,h4,.hero h1,.sec-head h2,.cta-band h2,.stat-xl .v{font-family:var(--font-display)}
.hero h1,.sec-head h2,.cta-band h2{letter-spacing:-.03em}
.eyebrow{font-family:var(--font-mono);font-weight:var(--fw-medium)}
.band-soft{background:var(--surface-2)}
.band-ink{position:relative;background:#0C1222;color:#E7EAF2;overflow:hidden}
.band-ink .eyebrow{color:#8C97B5}.band-ink .eyebrow .seal{color:var(--accent)}
.band-ink h1,.band-ink h2,.band-ink h3{color:#fff}
.band-ink .lead,.band-ink p,.band-ink .muted{color:#AAB4CE}
.band-ink::before{content:"";position:absolute;inset:0;background:radial-gradient(55% 60% at 82% 6%,color-mix(in srgb,var(--brand) 42%,transparent),transparent 72%);pointer-events:none}
.band-ink>.container,.band-ink>.hero{position:relative}
.band-ink .btn-secondary{background:transparent;color:#fff;border-color:#2C3B5E}
.band-ink .btn-secondary:hover{background:rgba(255,255,255,.06);border-color:#3a4a73}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:var(--space-12);align-items:center}
@media(max-width:920px){.hero-grid{grid-template-columns:1fr;gap:var(--space-10)}}
.hero-card{background:#11192E;border:1px solid #243154;border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);padding:var(--space-5);max-width:400px;margin-left:auto}
.hc-head{display:flex;align-items:center;gap:10px;padding-bottom:var(--space-3);border-bottom:1px solid #243154;margin-bottom:var(--space-2)}
.hc-ic{width:32px;height:32px;border-radius:var(--radius-sm);background:color-mix(in srgb,var(--brand) 32%,#11192E);color:#fff;display:grid;place-items:center;flex:none}
.hc-name{font-size:var(--fs-sm);color:#E7EAF2;font-weight:600}
.hc-sub{font-size:var(--fs-2xs);color:#8C97B5;font-family:var(--font-mono)}
.hc-live{margin-left:auto;font-size:var(--fs-2xs);color:#7AE8B0;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.04em}
.hc-live::before{content:"";width:7px;height:7px;border-radius:50%;background:#2BD97D;box-shadow:0 0 0 0 rgba(43,217,125,.6);animation:hcpulse 2s infinite}
@keyframes hcpulse{70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.hc-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:var(--fs-sm);color:#C8D0E0}
.hc-check{width:20px;height:20px;border-radius:50%;background:rgba(43,217,125,.16);color:#2BD97D;display:grid;place-items:center;flex:none;opacity:0;transform:scale(.5);animation:hcpop 6s infinite}
.hc-row:nth-of-type(2) .hc-check{animation-delay:.5s}
.hc-row:nth-of-type(3) .hc-check{animation-delay:1.3s}
.hc-row:nth-of-type(4) .hc-check{animation-delay:2.1s}
@keyframes hcpop{0%,4%{opacity:0;transform:scale(.5)}11%,92%{opacity:1;transform:scale(1)}100%{opacity:1}}
.hc-prog{height:6px;background:#1B2540;border-radius:var(--radius-pill);overflow:hidden;margin:var(--space-3) 0 var(--space-2)}
.hc-prog>i{display:block;height:100%;width:8%;background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:inherit;animation:hcfill 6s infinite}
@keyframes hcfill{0%{width:8%}10%{width:24%}90%,100%{width:100%}}
.hc-foot{display:flex;align-items:center;gap:8px;font-size:var(--fs-2xs);color:#8C97B5}
.hc-foot .hc-status{font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:var(--radius-pill);background:rgba(43,217,125,.18);color:#7AE8B0;opacity:0;animation:hcpop 6s infinite;animation-delay:3s}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-6)}
@media(max-width:780px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat-xl .v{font-size:clamp(2rem,3.6vw,3rem);font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--text)}
.stat-xl .l{font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:8px}
.journey{display:grid;grid-template-columns:repeat(6,1fr)}
@media(max-width:860px){.journey{grid-template-columns:repeat(3,1fr);row-gap:var(--space-6)}}
@media(max-width:520px){.journey{grid-template-columns:repeat(2,1fr)}}
.jstep{position:relative;padding:0 var(--space-3);text-align:center}
.jstep::before{content:"";position:absolute;top:18px;left:-50%;width:100%;height:2px;background:var(--border-color);z-index:0}
.jstep:first-child::before{display:none}
.jdot{position:relative;z-index:1;width:38px;height:38px;border-radius:50%;background:var(--brand-50);color:var(--brand);display:grid;place-items:center;margin:0 auto var(--space-3);box-shadow:0 0 0 4px var(--bg)}
.jt{font-weight:600;font-size:var(--fs-sm)}
.jd{font-size:var(--fs-2xs);margin-top:4px}
.svc-pro{display:flex;flex-direction:column;padding:var(--space-6);border:1px solid var(--border-color);border-radius:var(--radius-lg);background:var(--surface);transition:var(--transition-base)}
.svc-pro:hover{border-color:var(--border-strong-color);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.svc-pro .svc-ic{margin-bottom:var(--space-4)}
.svc-pro h3{font-size:var(--fs-h4);font-weight:600;letter-spacing:-.01em}
.svc-pro .svc-benefit{color:var(--text-muted);font-size:var(--fs-sm);margin-top:var(--space-2)}
.svc-pro .svc-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:var(--space-4)}
.svc-pro .price{font-weight:600}
.svc-expand{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--dur-slow) var(--ease-out)}
.svc-pro.open .svc-expand{grid-template-rows:1fr}
.svc-expand-in{overflow:hidden}
.svc-pro.open .svc-expand-in{padding-top:var(--space-4);margin-top:var(--space-4);border-top:1px solid var(--border-color)}
.svc-actions{display:flex;gap:8px;align-items:center;margin-top:var(--space-5)}
.trust-badges{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.tbadge{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border-color);background:var(--surface);border-radius:var(--radius-pill);padding:8px 14px;font-size:var(--fs-xs);font-weight:500;color:var(--text)}
.tbadge .ic{color:var(--success)}
.reveal{opacity:0;transform:translateY(14px);transition:opacity .6s var(--ease-out),transform .6s var(--ease-out)}
.reveal.in{opacity:1;transform:none}
.divider-glow{height:1px;border:0;background:linear-gradient(90deg,transparent,var(--border-strong-color),transparent);max-width:var(--container-max);margin:0 auto}

/* ---- AI advisor + marketplace ---- */
.advisor-wrap{max-width:780px;margin:0 auto;padding:var(--space-5) var(--space-6) var(--space-10);display:flex;flex-direction:column}
.advisor-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-4) 0;border-bottom:1px solid var(--border-color);margin-bottom:var(--space-4)}
.advisor-head .avatar{width:38px;height:38px}
.thread.advisor-thread{min-height:46vh;max-height:calc(100vh - var(--hud-h) - 240px);overflow:auto;padding:var(--space-2) 0;display:flex;flex-direction:column;gap:var(--space-3)}
.advisor-chips{margin-top:var(--space-2);align-self:flex-start}
.advisor-composer{position:sticky;bottom:0;background:var(--bg);padding:var(--space-3) 0 0;margin-top:var(--space-3);border-top:1px solid var(--border-color)}
.advisor-composer .input{flex:1}
.bubble.typing{display:inline-flex;gap:5px;align-items:center;width:auto}
.bubble.typing span{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:blink 1.2s infinite}
.bubble.typing span:nth-child(2){animation-delay:.18s}.bubble.typing span:nth-child(3){animation-delay:.36s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:.9;transform:translateY(-3px)}}
.advisor-rec{border-color:var(--brand);max-width:520px;width:100%}
.rec-svc{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border-color)}
.rec-svc:last-of-type{border-bottom:0}
.rec-jur{border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:12px;background:var(--surface-2)}
.advisor-hero{margin-top:var(--space-8);max-width:580px;border-color:var(--brand);cursor:pointer;transition:var(--transition-base)}
.advisor-hero:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.mkt-cats{flex-wrap:wrap}
.mkt-grid .mkt-card,.grid .mkt-card{height:100%}
.compare-bar{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border-color);box-shadow:var(--shadow-lg);padding:12px var(--space-6);z-index:1100}
.compare-bar .container{max-width:var(--container-max);margin:0 auto}
.ai-launcher{position:fixed;right:20px;bottom:20px;z-index:1150;display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;border:0;border-radius:var(--radius-pill);padding:12px 18px;font-weight:600;font-size:var(--fs-sm);box-shadow:var(--shadow-lg);cursor:pointer;transition:var(--transition-colors)}
.ai-launcher:hover{background:var(--brand-dark)}
.ai-launcher .ic{width:18px;height:18px}
@media(max-width:620px){.ai-launcher span{display:none}.ai-launcher{padding:14px}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto}}
</style>
</head>

function hex2rgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return[parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
function rgb2hex(r,g,b){return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');}
function darken(h,p){const[r,g,b]=hex2rgb(h);return rgb2hex(r*(1-p),g*(1-p),b*(1-p));}
function tint(h,p){const[r,g,b]=hex2rgb(h);return rgb2hex(r+(255-r)*p,g+(255-g)*p,b+(255-b)*p);}

/* ---- AI Screening (smart layer over raw AML) ----
   Deterministic, derived from amlResult + OWNERSHIP + state.submissions.
   AI "resolves" many raw vendor hits into a few true matches. */
function aiHits(ref){const h=[...String(ref)].reduce((a,c)=>a+c.charCodeAt(0),0);return 11+(h%9)*3;} /* raw list noise per subject */
function aiScreen(){
  const subs=state.submissions, om=ownMap();
  let entities=0,people=0,subsidiaries=0,raw=0,structures=0;
  const matches=[];
  subs.forEach(x=>{
    entities++; raw+=aiHits(x.ref);
    const r=amlResult(x.ref);
    if(r.pep==='match')matches.push(aiMk(x.name,x.nationality,'PEP',88+(x.ref.charCodeAt(9)%9),x.ref,'person'));
    if(r.adverse==='flag')matches.push(aiMk(x.name,x.nationality,'Adverse media',71+(x.ref.charCodeAt(8)%12),x.ref,'person'));
    const o=om[x.ref];
    if(o){structures++;(function walk(ns){ns.forEach(n=>{entities++;raw+=aiHits(n.name);
      if(n.type==='person')people++;else subsidiaries++;
      if(n.screen==='pep')matches.push(aiMk(n.name,n.jur,'PEP',82+(n.name.length%10),x.ref,n.type));
      if(n.screen==='adverse')matches.push(aiMk(n.name,n.jur,'Adverse media',76+(n.name.length%9),x.ref,n.type));
      if(n.children)walk(n.children);});})(o.tree);}
  });
  return {entities,applicants:subs.length,people,subsidiaries,structures,raw,matches};
}
function aiMk(name,jur,list,score,ref,type){
  const sev=score>=85?'high':score>=72?'medium':'low';
  const reason={
    'PEP':'Strong name and date-of-birth alignment with a politically-exposed person via a state-linked board seat. Jurisdiction and known associates corroborate the match.',
    'Adverse media':'Multiple credible outlets link this subject to the named entity in the same role and period. Outlier and low-relevance articles were down-weighted.',
    'Sanctions':'Direct identifier match against a current consolidated sanctions listing — no plausible namesake found.'
  }[list]||'AI cross-checked identifiers against the candidate list entry.';
  const dismissed=Math.max(0,Math.round(score/9)+(name.length%5));
  return {name,jur,list,score:Math.min(97,score),sev,ref,type,reason,dismissed,
    sources:list==='Adverse media'?['ComplyAdvantage','Reuters','Local registry']:list==='PEP'?['ComplyAdvantage','PEP register']:['ComplyAdvantage','OFAC / EU']};
}

const KYC_DOC_FLAGS={Nigeria:'🇳🇬',Denmark:'🇩🇰',UAE:'🇦🇪','United Arab Emirates':'🇦🇪',India:'🇮🇳',Czechia:'🇨🇿',Portugal:'🇵🇹',France:'🇫🇷',Singapore:'🇸🇬',Germany:'🇩🇪',Norway:'🇳🇴'};

function kycResult(ref){
  const hash=[...String(ref)].reduce((a,c)=>a+c.charCodeAt(0),0);
  const sx=sub(ref);
  const corporate=sx&&sx.company&&sx.company!=='—';
  const docType=corporate?'Passport':(hash%3===0?'National ID':'Passport');
  const faceMatch=78+hash%21;                 // 78–98
  const liveness=hash%7!==0;                   // mostly pass
  const deepfake=hash%5!==0;                    // mostly clear
  const docCountry=sx?sx.nationality:'—';
  let status='verified';
  if(!liveness||!deepfake||faceMatch<82)status='review';
  return {docType,docCountry,faceMatch,liveness,deepfake,status,
    docNumber:(docType==='Passport'?'P':'ID')+(String.fromCharCode(65+hash%26))+(10000000+hash*7919%89999999),
    expiry:'20'+(30+hash%6)+'-0'+(1+hash%9)+'-'+(10+hash%18),
    confidence:Math.min(99,84+hash%15)};
}

  if(RISK_HIGH_JUR[x.jurisdictionId])jp=30; else if(RISK_MED_JUR[x.jurisdictionId])jp=18; else if(!j.eu)jp=15; else jp=8;
  // 2) Nationality / cross-border (max 20) — non-EU UBO nationality
  const np=x.nonEU?18:6;
  // 3) Structure complexity (max 25) — ownership depth & layered entities
  let depth=0,entities=0; const o=ownMap()[ref];
  if(o){const st=ownStats(o);entities=st.entities; (function d(ns,lvl){ns.forEach(n=>{depth=Math.max(depth,lvl);if(n.children)d(n.children,lvl+1);});})(o.tree,1);}
  let cp = o ? Math.min(25, 8 + depth*4 + Math.max(0,entities-1)*3) : (x.company!=='—'?9:3);
  // 4) Screening hits (max 25) — sanctions/PEP/adverse from amlResult
  const a=amlResult(ref);
  let scp=0; if(a.sanctions==='match')scp+=25; if(a.pep==='match')scp+=12; if(a.adverse==='flag')scp+=13; scp=Math.min(25,scp);
  // 5) Document completeness (max 15) — lower completeness = higher risk
  const comp=x.completenessOverride||x.completeness;
  const dp={low:15,med:8,high:3}[comp]!=null?{low:15,med:8,high:3}[comp]:8;
  const drivers=[
    {key:'jur',label:'Jurisdiction risk',ic:'globe',pts:jp,max:30,detail:j.flag+' '+j.name+' — '+(RISK_HIGH_JUR[x.jurisdictionId]?'high-risk rating':RISK_MED_JUR[x.jurisdictionId]?'elevated rating':(j.eu?'EU member, low rating':'non-EU jurisdiction'))+' (country-risk feed).'},
    {key:'nat',label:'Cross-border nationality',ic:'passport',pts:np,max:20,detail:esc(x.nationality)+' — '+(x.nonEU?'non-EU national, enhanced KYC applies':'EU/EEA national, standard KYC')+'.'},
    {key:'struct',label:'Ownership complexity',ic:'sitemap',pts:cp,max:25,detail:o?(entities+'-entity structure, '+depth+' layer'+(depth===1?'':'s')+' deep'):(x.company!=='—'?'Corporate applicant, single layer':'Individual applicant, no structure')+'.'},
    {key:'screen',label:'Screening exposure',ic:'shield',pts:scp,max:25,detail:scp===0?'No sanctions, PEP or adverse-media hits.':[a.sanctions==='match'?'sanctions':'',a.pep==='match'?'PEP':'',a.adverse==='flag'?'adverse media':''].filter(Boolean).join(' + ')+' match flagged.'},
    {key:'docs',label:'Documentation gaps',ic:'documents',pts:dp,max:15,detail:({low:'Low completeness — key documents outstanding',med:'Partial documentation on file',high:'Documentation complete and verified'}[comp]||'Partial documentation on file')+'.'}
  ];
  const raw=jp+np+cp+scp+dp; // theoretical max = 30+20+25+25+15 = 115
  const score=Math.max(0,Math.min(100,Math.round(raw/115*100)));
  const top=drivers.slice().sort((p,q)=>(q.pts/q.max)-(p.pts/p.max))[0];
  return {ref,name:x.name,company:x.company,score,band:riskBandFor(score),drivers,top,override:false};
}

function go(viewId){
  if(!VIEWS[viewId])viewId='public-landing';
  state.session.currentViewId=viewId;

  if(viewId==='advisor'){const t=document.querySelector('.advisor-thread');if(t)t.scrollTop=t.scrollHeight;const i=document.getElementById('advisor-input');if(i)i.focus();}
}
function enhance(){try{if(!('IntersectionObserver' in window))return;if(window._revObs)window._revObs.disconnect();window._revObs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');window._revObs.unobserve(e.target);}});},{threshold:.08,rootMargin:'0px 0px -40px 0px'});document.querySelectorAll('#app .reveal:not(.in)').forEach(function(el){window._revObs.observe(el);});}catch(e){}}
function render(){
  applyTheme();renderHud();
  const v=VIEWS[state.session.currentViewId]||VIEWS['public-landing'];
  document.getElementById('app').innerHTML=v(state);
  enhance();
}
function setRole(role){
  state.session.activeRole=role;

}

document.addEventListener('click',e=>{
  const closeM=e.target.closest('[data-close-modal]');
  if(closeM && e.target===closeM){if(document.getElementById('modal-root').dataset.lock)return;closeModal();return;}
  const role=e.target.closest('[data-role]'); if(role){setRole(role.dataset.role);return;}
  const theme=e.target.closest('[data-theme]'); if(theme){state.whiteLabel.theme=theme.dataset.theme;state.whiteLabel.accent=null;const p=BRAND_PRESETS.find(b=>b.theme===theme.dataset.theme);if(p)state.whiteLabel.brandName=p.name;render();persist();return;}
  const tier=e.target.closest('[data-tier]'); if(tier){state.whiteLabel.planTier=tier.dataset.tier;render();persist();return;}
  const act=e.target.closest('[data-action]'); if(act){if(act.tagName!=='SELECT'){const fn=ACTIONS[act.dataset.action];if(fn){fn(act,e);}}return;}
  const nav=e.target.closest('[data-nav]'); if(nav){go(nav.dataset.nav);return;}
});
document.addEventListener('input',e=>{
  if(e.target.id==='hud-brand'){state.whiteLabel.brandName=e.target.value||'Brand';applyTheme();

    const vid=state.session.currentViewId;document.getElementById('app').innerHTML=VIEWS[vid](state);persist();return;}

    document.querySelectorAll('.brand-dots button').forEach(b=>b.classList.remove('active'));return;}
  const handler=e.target.closest('[data-input]'); if(handler && ACTIONS[handler.dataset.input]){ACTIONS[handler.dataset.input](handler,e);}
});

function setPath(obj,path,val){const ks=path.split('.');let o=obj;for(let i=0;i<ks.length-1;i++){o[ks[i]]=o[ks[i]]||{};o=o[ks[i]];}o[ks[ks.length-1]]=val;}
function calcCompleteness(d){
  let score=0;
  if(d.email)score++; if(d.serviceId)score++;
  if(d.conditional&&Object.values(d.conditional).filter(Boolean).length>=2)score+=2;
  if(d.personal&&d.personal.name&&d.personal.nationality)score++;
  if(d.documents&&d.documents.length>=2)score+=2;
  if(d.intent&&d.intent.text&&d.intent.text.length>10)score++;
  return score<=3?'low':score<=6?'med':'high';
}
function intakeShell(step,title,body,footerLeft,footerRight){
  const total=7;const pct=Math.round(step/total*100);
  const d=ensureDraft();const c=d.completeness||'low';
  return '<div class="intake-top"><div class="intake-top-inner">'+
    '<div class="row-between mb-4"><div class="wordmark" data-nav="public-landing" style="font-size:var(--fs-body)"><span class="mk" style="width:22px;height:22px;font-size:12px">'+brandInitial()+'</span><span>'+esc(brand())+'</span></div>'+
    '<div class="row gap-4"><span class="completeness '+c+'" title="Brief completeness"><span class="muted" style="font-weight:500;text-transform:none;letter-spacing:0;font-size:var(--fs-2xs)">Brief:</span> <span class="bars"><i></i><i></i><i></i></span>'+({low:'Low',med:'Medium',high:'High'}[c])+'</span>'+
    '<a class="muted" data-action="saveExit" style="font-size:var(--fs-xs);cursor:pointer">Save &amp; exit</a></div></div>'+
    '<div class="steprow"><span>Step '+step+' of '+total+'</span><span class="mono">'+pct+'%</span></div><div class="progress"><i style="width:'+pct+'%"></i></div>'+
  '</div></div>'+
  '<div class="intake-wrap"><h2 class="intake-h">'+title+'</h2>'+body+'</div>'+
  '<div class="intake-foot"><div class="intake-foot-inner"><div>'+(footerLeft||'')+'</div><div class="row gap-3">'+(footerRight||'')+'</div></div></div>';
}

function clientTimeline(sub){
  const stages=[{k:'submitted',t:'Application submitted'},{k:'review',t:'Under review'},{k:'approved',t:'Approved'},{k:'booked',t:'Consultation booked'}];
  const hasBooking=state.bookings.find(b=>b.submissionId===sub.ref);
  let cur=1;if(sub.status==='approved')cur=hasBooking?3:2;if(sub.status==='submitted')cur=1;
  const rejected=sub.status==='rejected';
  return '<div class="timeline">'+stages.map((st,i)=>{
    let cls=i<cur?'done':i===cur?'active':'';
    if(rejected&&i===1){return '<div class="tl-item rejected"><div class="node"></div><div class="tl-title">Not approved</div><div class="tl-meta">Review the message for next steps</div></div>';}
    if(rejected&&i>1)return '';
    const meta=i<=cur?(sub.timeline[i]&&sub.timeline[i].meta||'2026-06-20'):'Pending';
    return '<div class="tl-item '+cls+'"><div class="node"></div><div class="tl-title">'+st.t+'</div><div class="tl-meta">'+meta+'</div></div>';
  }).join('')+'</div>';
}

function amlResult(ref){
  const hash=[...String(ref)].reduce((a,c)=>a+c.charCodeAt(0),0);
  const pep=hash%4===0, adverse=hash%6===0;
  return {sanctions:'clear',pep:pep?'match':'clear',adverse:adverse?'flag':'clear',risk:(pep&&adverse)?'high':(pep||adverse)?'medium':'low'};
}
function amlBadge(v){if(v==='clear')return '<span class="badge badge-approved"><span class="bdot"></span>Clear</span>';if(v==='match')return '<span class="badge badge-pending badge-live"><span class="bdot"></span>PEP match</span>';if(v==='flag')return '<span class="badge badge-rejected"><span class="bdot"></span>Adverse</span>';return '<span class="badge badge-neutral">'+v+'</span>';}
function riskBadge(r){return '<span class="badge '+({low:'badge-approved',medium:'badge-pending',high:'badge-rejected'})[r]+'"><span class="bdot"></span>'+r+' risk</span>';}

function ownMap(){return state.ownership||OWNERSHIP;}
function ownerBadges(n){
  const k={verified:['badge-approved','KYC verified'],pending:['badge-pending','KYC pending'],'n-a':['badge-neutral','KYC n/a']}[n.kyc]||['badge-neutral','—'];
  const sc={clear:['badge-approved','Clear'],review:['badge-pending','Under review'],pep:['badge-pending badge-live','PEP match'],adverse:['badge-rejected','Adverse'],'n-a':['badge-neutral','Not screened']}[n.screen]||['badge-neutral','—'];
  return '<span class="badge '+k[0]+'"><span class="bdot"></span>'+k[1]+'</span><span class="badge '+sc[0]+'"><span class="bdot"></span>'+sc[1]+'</span>';
}
function renderOwner(n,parentFrac,depth,isLast){
  const frac=parentFrac*(n.pct/100), eff=frac*100, ubo=n.type==='person'&&eff>=25;
  const effLbl=(Math.round(eff*10)/10).toString().replace(/\.0$/,'');
  let h='<div class="onode'+(isLast?' last':'')+'">'+
    '<div class="ocard'+(ubo?' ubo':'')+'">'+
      '<div class="onode-ic '+n.type+'">'+icon(n.type==='person'?'user':'building','ic-18')+'</div>'+
      '<div class="grow"><div class="row gap-2 wrap" style="align-items:center"><strong>'+esc(n.name)+'</strong>'+(ubo?'<span class="ubo-tag">UBO</span>':'')+'<span class="tag">'+n.flag+' '+esc(n.jur)+'</span></div>'+
        '<div class="muted" style="font-size:var(--fs-2xs)">'+esc(n.role)+'</div></div>'+
      '<div style="flex:none"><div class="opct">'+n.pct+'%</div>'+(depth>1?'<div class="oeff">≈'+effLbl+'% effective</div>':'')+'</div>'+
      '<div class="ocard-badges">'+ownerBadges(n)+'</div>'+
    '</div>';
  const kids=n.children||[];
  if(kids.length)h+='<div class="branch">'+kids.map((c,i)=>renderOwner(c,frac,depth+1,i===kids.length-1)).join('')+'</div>';
  return h+'</div>';
}
function ownStats(o){let entities=1,ubos=0,flags=0;(function w(ns,pf){ns.forEach(n=>{const f=pf*(n.pct/100);if(n.type==='entity')entities++;if(n.type==='person'&&f*100>=25)ubos++;if(n.screen==='pep'||n.screen==='adverse'||n.screen==='review')flags++;if(n.children)w(n.children,f);});})(o.tree,1);return{entities,ubos,flags};}
function ownershipLinkCard(x){
  if(!tierAtLeast('scale'))return '';
  const o=ownMap()[x.ref];if(!o)return '';
  const st=ownStats(o);
  return '<div class="card mt-4"><div class="row gap-3" style="align-items:center"><div class="onode-ic entity">'+icon('sitemap','ic-18')+'</div><div class="grow"><strong>Ownership structure &amp; UBO</strong><div class="muted" style="font-size:var(--fs-xs)">'+esc(o.entity)+' · '+st.ubos+' UBO'+(st.ubos===1?'':'s')+' across '+st.entities+' entities'+(st.flags?' · '+st.flags+' screening flag'+(st.flags===1?'':'s'):'')+'</div></div><button class="btn btn-secondary btn-sm" data-action="openOwnership" data-k="'+x.ref+'">View ownership map</button></div></div>';
}

function INTENT_BY_ID(id){return ADVISOR_INTENTS.find(i=>i.id===id)||ADVISOR_INTENTS[ADVISOR_INTENTS.length-1];}
function advisorGreeting(){return "Hi — I'm "+esc(brand())+"'s advisor. Tell me what you're trying to do in plain words — lower your tax, set up a company, get a business bank account, relocate — and I'll point you to the right service and jurisdiction. What's on your mind?";}
function ensureAdvisor(){if(!state.ui.advisor)state.ui.advisor={messages:[{role:'them',text:advisorGreeting()}],chips:STARTER_CHIPS.slice(),stage:'await',pending:null,rec:null};return state.ui.advisor;}
function scrollThread(){const t=document.querySelector('.advisor-thread');if(t)t.scrollTop=t.scrollHeight;}
function matchIntent(text){const t=(text||'').toLowerCase();
  if(/(crypto|forex|licen|vasp|mica|gambling|igaming)/.test(t)&&/(company|bank|account|set up|start)/.test(t))return INTENT_BY_ID('crypto-licensing');
  let best=null,bestScore=0;for(const it of ADVISOR_INTENTS){if(it.id==='fallback')continue;let sc=0;for(const trg of it.triggers){if(t.indexOf(trg)>=0)sc++;}if(sc>bestScore){bestScore=sc;best=it;}}
  return bestScore>0?best:INTENT_BY_ID('fallback');}
function advisorReceive(text){if(!text||!text.trim())return;const a=ensureAdvisor();a.chips=null;a.messages.push({role:'me',text:text.trim()});a.stage='typing';persist();render();scrollThread();setTimeout(()=>advisorRespond(text.trim()),750);}
function advisorRespond(text){const a=ensureAdvisor();
  if(a.pending){const intent=INTENT_BY_ID(a.pending.intentId);let target=intent;if(intent.branchRoute&&intent.branchRoute[text])target=INTENT_BY_ID(intent.branchRoute[text]);
    const reply=(intent.botReplyAfter&&intent.botReplyAfter[text])||target.botReply;a.pending=null;a.chips=null;a.messages.push({role:'them',text:reply});buildRec(target);return;}
  const intent=matchIntent(text);a.messages.push({role:'them',text:intent.botReply});
  if(intent.clarify){a.pending={intentId:intent.id};a.chips=intent.clarifyChips;a.stage='clarify';persist();render();scrollThread();return;}
  if(intent.id==='fallback'){a.pending=null;a.chips=intent.clarifyChips;a.stage='await';persist();render();scrollThread();return;}
  buildRec(intent);}
function buildRec(intent){const a=ensureAdvisor();a.rec={serviceIds:intent.recommendServices,jurIds:intent.recommendJurisdictions,primaryJur:intent.recommendJurisdictions[0],showProviders:intent.showProviders};a.chips=null;a.messages.push({role:'them',card:a.rec});a.stage='done';persist();render();scrollThread();}
function svcToCat(id){return {banking:'banking',licensing:'licensing',accounting:'advisory',formation:'csp'}[id]||'all';}
function recCardHtml(card){const jr=jur(card.primaryJur);
  const svcs=card.serviceIds.map((id,i)=>{const sx=svc(id);return '<div class="rec-svc"><div class="svc-ic" style="width:32px;height:32px;margin:0">'+icon(sx.icon)+'</div><div class="grow"><div class="row gap-2" style="align-items:center"><strong>'+sx.name+'</strong>'+(i===0?'<span class="badge badge-new">Recommended</span>':'')+'</div><div class="muted" style="font-size:var(--fs-xs)">From '+sx.priceFrom+' · '+(sx.billing==='monthly'?'monthly':'one-off')+' · ~'+sx.timeline+'</div></div></div>';}).join('');
  const others=card.jurIds.slice(1).map(id=>jur(id).flag+' '+jur(id).name).join(' · ');
  const ps=card.serviceIds[0];
  return '<div class="card advisor-rec"><div class="eyebrow mb-3"><span class="seal">—</span> MY RECOMMENDATION</div>'+
    '<div class="flabel">'+(card.serviceIds.length>1?'Services':'Service')+'</div>'+svcs+
    '<div class="flabel mt-4">Where</div><div class="rec-jur"><div class="row-between wrap"><div class="row gap-2" style="align-items:center"><span style="font-size:20px">'+jr.flag+'</span><strong>'+jr.name+'</strong>'+(jr.eu?'<span class="tag">EU</span>':'')+'</div><div class="row gap-3 mono muted" style="font-size:var(--fs-xs)"><span>Corp '+jr.corpTax+'%</span><span>VAT '+jr.vat+'%</span><span>~'+jr.days+'d</span></div></div>'+(others?'<div class="muted mt-2" style="font-size:var(--fs-xs)">Also strong: '+others+'</div>':'')+'</div>'+
    '<div class="note mt-4">'+icon('sparkles','ic-16')+'<div>Indicative — from '+svc(ps).priceFrom+' · live in ~'+jr.days+' days · '+jr.corpTax+'% on profits. Your specialist confirms before anything is filed.</div></div>'+
    '<div class="row gap-2 mt-4 wrap"><button class="btn btn-primary" data-action="advisorStart" data-svc="'+ps+'" data-jur="'+card.primaryJur+'">'+icon('arrow','ic-16')+' Start application</button>'+
    (card.showProviders?'<button class="btn btn-secondary" data-action="advisorProviders" data-svc="'+ps+'" data-jur="'+card.primaryJur+'">'+icon('users','ic-16')+' See matching providers</button>':'')+
    '<button class="btn btn-ghost" data-action="advisorCompare">'+icon('scale','ic-16')+' Compare jurisdictions</button></div>'+
    '<div class="muted mt-3" style="font-size:var(--fs-2xs)">Starting points, not formal advice — your dedicated specialist confirms before anything is filed.</div></div>';}
VIEWS['advisor']=s=>{const a=ensureAdvisor();
  const bubbles=a.messages.map(m=>m.card?'<div class="bubble them" style="max-width:96%;background:transparent;padding:0">'+recCardHtml(m.card)+'</div>':'<div class="bubble '+(m.role==='me'?'me':'them')+'">'+esc(m.text)+'</div>').join('');
  const typing=a.stage==='typing'?'<div class="bubble them typing"><span></span><span></span><span></span></div>':'';
  const chips=(a.chips&&a.chips.length&&a.stage!=='typing')?'<div class="chips advisor-chips">'+a.chips.map(c=>'<button class="chip" data-action="advisorChip" data-text="'+esc(c)+'">'+esc(c)+'</button>').join('')+'</div>':'';
  return publicNav('advisor')+'<div class="advisor-wrap">'+
    '<div class="advisor-head"><div class="row gap-2" style="align-items:center"><div class="avatar" style="background:var(--brand)">'+icon('sparkles','ic-18')+'</div><div><div style="font-weight:600">'+esc(brand())+' Advisor <span class="badge badge-new">AI</span></div><div class="muted" style="font-size:var(--fs-2xs)">Free, instant, no sign-up · tell me your situation</div></div></div><button class="btn btn-ghost btn-sm" data-action="advisorReset">Start over</button></div>'+
    '<div class="thread advisor-thread">'+bubbles+typing+chips+'</div>'+
    '<div class="composer advisor-composer"><input class="input" id="advisor-input" placeholder="Describe what you need…" autocomplete="off"><button class="btn btn-primary btn-icon" data-action="advisorSend">'+icon('arrow')+'</button></div>'+
    '</div>';};
ACTIONS['advisorSend']=()=>{const i=document.getElementById('advisor-input');if(!i)return;const v=i.value;if(!v.trim())return;i.value='';advisorReceive(v);};
ACTIONS['advisorChip']=el=>{advisorReceive(el.dataset.text);};
ACTIONS['advisorChipLaunch']=el=>{go('advisor');advisorReceive(el.dataset.text);};
ACTIONS['advisorReset']=()=>{state.ui.advisor=null;ensureAdvisor();render();scrollThread();};
ACTIONS['advisorStart']=el=>{const d=ensureDraft();d.serviceId=el.dataset.svc;d.jurisdictionId=el.dataset.jur;d.source='advisor';persist();toast('Application started','Pre-filled from your chat.','success');go('intake-step-service');};
ACTIONS['advisorProviders']=el=>{ensureMkt();state.ui.mkt.cat=svcToCat(el.dataset.svc);state.ui.mkt.jur=el.dataset.jur||'all';state.ui.mkt.page=6;persist();go('marketplace');toast('Matched partners','Showing '+esc(brand())+' partners that fit your case.','info');};
ACTIONS['advisorCompare']=()=>{const a=ensureAdvisor();if(a.rec)state.ui.jSel=a.rec.jurIds.slice();persist();go('tool-jurisdiction-comparison');};
