function ensureMkt(){state.providers=state.providers||PROVIDERS;state.providerCategories=state.providerCategories||PROVIDER_CATEGORIES;state.applications=state.applications||[];
  state.ui.mkt=state.ui.mkt||{cat:'all',jur:'all',industry:'all',speed:'all',remote:false,q:'',sort:'featured',compare:[],view:'grid',page:6};return state.ui.mkt;}
function catLabel(c){const cats=state.providerCategories||PROVIDER_CATEGORIES;return (cats.find(x=>x.id===c)||{label:c}).label;}
function provInitials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function mktFiltered(){const m=ensureMkt();let list=state.providers.slice();
  if(m.cat!=='all')list=list.filter(p=>p.category===m.cat);
  if(m.jur!=='all')list=list.filter(p=>p.jurisdictions.includes(m.jur));
  if(m.industry!=='all')list=list.filter(p=>p.industries.includes(m.industry));
  if(m.remote)list=list.filter(p=>p.remote);
  if(m.speed!=='all')list=list.filter(p=>{const d=p.onboardDays;if(m.speed==='instant')return /business day/.test(d)&&parseInt(d)<=3;if(m.speed==='week')return !/month/.test(d)&&(/week/.test(d)||/business day/.test(d));if(m.speed==='month')return /month/.test(d);return true;});
  if(m.q){const q=m.q.toLowerCase();list=list.filter(p=>(p.name+' '+p.type+' '+p.blurb).toLowerCase().includes(q));}
  const sp=p=>parseInt(String(p.onboardDays))||99;const fee=p=>p.monthlyFee==='—'?9999:(parseInt(String(p.monthlyFee).replace(/[^0-9]/g,''))||0);
  if(m.sort==='featured')list.sort((a,b)=>(b.sponsored-a.sponsored)||(b.rating-a.rating));
  else if(m.sort==='rating')list.sort((a,b)=>b.rating-a.rating);
  else if(m.sort==='fastest')list.sort((a,b)=>sp(a)-sp(b));
  else if(m.sort==='fees')list.sort((a,b)=>fee(a)-fee(b));
  return list;}
function feeHtml(v){return v==='Free'?'<span style="color:var(--success);font-weight:600">Free</span>':'<span class="mono">'+v+'</span>';}
function providerCard(p){const m=ensureMkt();const inC=m.compare.includes(p.id);
  const flags='<span style="font-size:16px">'+p.jurisdictions.slice(0,3).map(j=>jur(j).flag).join(' ')+(p.jurisdictions.length>3?' <span class="muted mono" style="font-size:var(--fs-2xs)">+'+(p.jurisdictions.length-3)+'</span>':'')+'</span>';
  const facts=p.category==='banking'
    ?'<dl class="dl" style="font-size:var(--fs-xs)"><dt>Opening</dt><dd>'+feeHtml(p.openingFee)+'</dd><dt>Monthly</dt><dd class="mono">'+p.monthlyFee+'</dd><dt>Min deposit</dt><dd class="mono">'+p.minDeposit+'</dd></dl>'
    :'<dl class="dl" style="font-size:var(--fs-xs)"><dt>Setup</dt><dd>'+feeHtml(p.openingFee)+'</dd><dt>Ongoing</dt><dd class="mono">'+p.monthlyFee+'</dd><dt>Lead time</dt><dd class="mono">'+p.onboardDays+'</dd></dl>';
  const inds=p.industries.map(i=>'<span class="tag"'+(/crypto|forex|iGaming/.test(i)?' style="color:var(--accent)"':'')+'>'+i+'</span>').join('')+(p.remote?'<span class="tag">'+icon('globe','ic-16')+' Remote</span>':'');
  return '<div class="card mkt-card" data-action="mktOpen" data-id="'+p.id+'">'+
    '<div class="row-between" style="align-items:flex-start"><div class="row gap-3" style="align-items:center"><div class="avatar avatar-sq">'+provInitials(p.name)+'</div><div><div style="font-weight:600">'+esc(p.name)+'</div><div class="muted" style="font-size:var(--fs-xs)">'+p.type+'</div></div></div><div class="stack gap-2" style="align-items:flex-end">'+(p.sponsored?'<span class="tag" style="color:var(--accent)">Featured</span>':'')+(p.verified?'<span class="badge badge-approved" title="Vetted by '+esc(brand())+'"><span class="bdot"></span>Verified</span>':'')+'</div></div>'+
    '<p class="muted mt-3" style="font-size:var(--fs-sm)">'+esc(p.blurb)+'</p>'+
    '<div class="row gap-3 mt-3" style="align-items:center">'+flags+'<span class="muted">·</span><span class="row gap-2 muted" style="font-size:var(--fs-xs)">'+icon('clock','ic-16')+'<span class="mono">'+p.onboardDays+'</span></span><span class="right"><span class="stars">★★★★★</span> <span class="mono" style="font-size:var(--fs-xs)">'+p.rating.toFixed(1)+'</span></span></div>'+
    '<div class="mt-3">'+facts+'</div>'+
    '<div class="row gap-2 mt-3 wrap">'+inds+'</div>'+
    '<div class="row gap-2 mt-4" style="margin-top:auto;padding-top:var(--space-3)"><button class="btn btn-primary btn-sm grow" data-action="mktApply" data-id="'+p.id+'">Get started</button><button class="chip'+(inC?' active':'')+'" data-action="mktCompareToggle" data-id="'+p.id+'">'+(inC?'Added':'Compare')+'</button></div>'+
    '</div>';}
function mktTable(list){const rows=list.map(p=>'<tr data-action="mktOpen" data-id="'+p.id+'"><td><div class="cell-entity"><div class="avatar avatar-sq" style="width:28px;height:28px;font-size:11px">'+provInitials(p.name)+'</div><div><div style="font-weight:500">'+esc(p.name)+'</div><div class="sub">'+p.type+'</div></div></div></td><td>'+catLabel(p.category)+'</td><td>'+p.jurisdictions.slice(0,4).map(j=>jur(j).flag).join(' ')+'</td><td class="mono">'+p.onboardDays+'</td><td class="mono">'+p.monthlyFee+'</td><td class="mono">'+p.rating.toFixed(1)+'</td><td style="text-align:right"><button class="btn btn-ghost btn-sm" data-action="mktApply" data-id="'+p.id+'">Get started</button></td></tr>').join('');
  return '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Partner</th><th>Category</th><th>Jurisdictions</th><th>Onboard</th><th>Monthly</th><th>Rating</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';}
function compareBar(){const m=ensureMkt();if(!m.compare.length)return '';
  const names=m.compare.map(id=>{const p=state.providers.find(x=>x.id===id);return '<span class="tag">'+esc(p.name)+'</span>';}).join(' ');
  return '<div class="compare-bar"><div class="container row-between wrap"><div class="row gap-3 wrap" style="align-items:center"><strong>'+m.compare.length+' selected</strong>'+names+'</div><div class="row gap-2"><button class="btn btn-ghost btn-sm" data-action="mktCompareClear">Clear</button><button class="btn btn-primary btn-sm" data-action="mktCompareOpen"'+(m.compare.length<2?' disabled':'')+'>Compare</button></div></div></div>';}

  const jurOpts=['all'].concat(state.jurisdictions.map(j=>j.id)).map(id=>'<option value="'+id+'"'+(m.jur===id?' selected':'')+'>'+(id==='all'?'All jurisdictions':jur(id).flag+' '+jur(id).name)+'</option>').join('');
  const indOpts=['all','general','crypto','forex','iGaming','fintech','ecommerce','trade'].map(o=>'<option value="'+o+'"'+(m.industry===o?' selected':'')+'>'+(o==='all'?'All industries':o)+'</option>').join('');

  const all=mktFiltered();const shown=all.slice(0,m.page);

      '<select class="select" style="width:auto" data-action="mktFilter" data-k="jur">'+jurOpts+'</select>'+

ACTIONS['mktCompareToggle']=el=>{const m=ensureMkt();const id=el.dataset.id;const i=m.compare.indexOf(id);if(i>=0)m.compare.splice(i,1);else{if(m.compare.length>=3){toast('Compare up to 3','Remove one to add another.','info');return;}m.compare.push(id);}persist();render();};
ACTIONS['mktCompareClear']=()=>{ensureMkt().compare=[];persist();render();};
ACTIONS['mktOpen']=el=>{const p=state.providers.find(x=>x.id===el.dataset.id);if(!p)return;
  const feats=p.features.map(f=>'<div class="row gap-2 mb-2" style="font-size:var(--fs-sm)">'+icon('check','ic-16')+'<span>'+f+'</span></div>').join('');
  const facts=(p.category==='banking'?'<dt>Account opening</dt><dd>'+feeHtml(p.openingFee)+'</dd><dt>Monthly fee</dt><dd class="mono">'+p.monthlyFee+'</dd><dt>Min deposit</dt><dd class="mono">'+p.minDeposit+'</dd>':'<dt>Setup</dt><dd>'+feeHtml(p.openingFee)+'</dd><dt>Ongoing</dt><dd class="mono">'+p.monthlyFee+'</dd>')+'<dt>Onboarding</dt><dd class="mono">'+p.onboardDays+'</dd><dt>Currencies</dt><dd>'+p.currencies+'</dd><dt>Jurisdictions</dt><dd>'+p.jurisdictions.map(j=>jur(j).flag+' '+jur(j).name).join(', ')+'</dd>';
  openModal('<div class="modal"><div class="modal-head"><div class="row gap-3" style="align-items:center"><div class="avatar avatar-sq">'+provInitials(p.name)+'</div><div><div style="font-weight:600">'+esc(p.name)+'</div><div class="muted" style="font-size:var(--fs-xs)">'+p.type+(p.verified?' · <span style="color:var(--success)">Verified partner</span>':'')+'</div></div></div><button class="btn btn-ghost btn-icon" data-close-modal-btn>'+icon('x','ic-18')+'</button></div>'+
    '<div class="modal-body"><p class="muted mb-4">'+esc(p.blurb)+'</p><dl class="dl mb-5">'+facts+'</dl><div class="flabel mb-3">What they handle</div>'+feats+'<div class="row gap-2 mt-4 wrap">'+p.industries.map(i=>'<span class="tag">'+i+'</span>').join('')+(p.remote?'<span class="tag">Remote onboarding</span>':'')+'</div><div class="note mt-4">'+icon('shield','ic-18')+'<div>Vetted and onboarded by '+esc(brand())+'. We make the introduction and remain on file as your point of contact.</div></div></div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" data-action="mktCompareToggle" data-id="'+p.id+'">Add to compare</button><button class="btn btn-primary" data-action="mktApply" data-id="'+p.id+'">'+icon('arrow','ic-16')+' Get started</button></div></div>');};
ACTIONS['mktCompareOpen']=()=>{const m=ensureMkt();if(m.compare.length<2)return;const ps=m.compare.map(id=>state.providers.find(x=>x.id===id));
  const rowAttr=(label,fn)=>'<tr><td class="muted">'+label+'</td>'+ps.map(p=>'<td>'+fn(p)+'</td>').join('')+'</tr>';
  openModal('<div class="modal" style="max-width:920px"><div class="modal-head"><h3>Compare partners</h3><button class="btn btn-ghost btn-icon" data-close-modal-btn>'+icon('x','ic-18')+'</button></div><div class="modal-body"><div class="tbl-wrap"><table class="tbl"><thead><tr><th></th>'+ps.map(p=>'<th>'+esc(p.name)+'<div class="muted" style="font-weight:400;text-transform:none;letter-spacing:0">'+p.type+'</div></th>').join('')+'</tr></thead><tbody>'+
    rowAttr('Category',p=>catLabel(p.category))+rowAttr('Jurisdictions',p=>p.jurisdictions.map(j=>jur(j).flag).join(' '))+rowAttr('Verified',p=>p.verified?'<span class="badge badge-approved"><span class="bdot"></span>Yes</span>':'—')+
    rowAttr('Opening fee',p=>feeHtml(p.openingFee))+rowAttr('Monthly',p=>'<span class="mono">'+p.monthlyFee+'</span>')+rowAttr('Min deposit',p=>'<span class="mono">'+p.minDeposit+'</span>')+
    rowAttr('Onboarding',p=>'<span class="mono">'+p.onboardDays+'</span>')+rowAttr('Currencies',p=>p.currencies)+rowAttr('Remote',p=>p.remote?icon('check','ic-16'):icon('x','ic-16'))+rowAttr('Rating',p=>'<span class="stars">★</span> <span class="mono">'+p.rating.toFixed(1)+'</span>')+
    '<tr><td></td>'+ps.map(p=>'<td><button class="btn btn-primary btn-sm" data-action="mktApply" data-id="'+p.id+'">Get started</button></td>').join('')+'</tr></tbody></table></div><p class="muted mt-3" style="font-size:var(--fs-xs)">All introductions are made and managed by '+esc(brand())+'.</p></div></div>');};
ACTIONS['mktApply']=el=>{const p=state.providers.find(x=>x.id===el.dataset.id);if(!p)return;ensureMkt();
  state.applications.unshift({id:'PA-'+String(state.applications.length+1).padStart(3,'0'),providerId:p.id,providerName:p.name,category:p.category,status:'sent',createdAt:'2026-06-20',responseBy:'within 24 hours'});
  state.ui.mkt.compare=state.ui.mkt.compare.filter(x=>x!==p.id);persist();
  openModal('<div class="modal"><div class="modal-head"><div class="row gap-2" style="align-items:center">'+icon('check')+'<h3>Sent to '+esc(p.name)+'</h3></div><button class="btn btn-ghost btn-icon" data-close-modal-btn>'+icon('x','ic-18')+'</button></div><div class="modal-body"><div class="center mb-4"><div style="width:64px;height:64px;border-radius:50%;background:var(--success-tint);color:var(--success);display:grid;place-items:center;margin:0 auto">'+icon('check','ic-24')+'</div></div><p class="center mb-4">Your request is in. '+esc(p.name)+' typically responds <strong>within 24 hours</strong>.</p><div class="note mb-4">'+icon('shield','ic-18')+'<div>We reused your verified KYC profile — no documents to re-submit. One profile, every partner.</div></div><div class="timeline"><div class="tl-item done"><div class="node"></div><div class="tl-title">Application sent</div><div class="tl-meta">Just now</div></div><div class="tl-item active"><div class="node"></div><div class="tl-title">Partner review</div><div class="tl-meta">Within 24 hours</div></div><div class="tl-item"><div class="node"></div><div class="tl-title">Introduction &amp; go live</div></div></div></div><div class="modal-foot"><button class="btn btn-ghost" data-close-modal-btn>Browse more</button><button class="btn btn-primary" data-action="mktViewApps">View my applications</button></div></div>');
  toast('Application sent','Shared your KYC profile with '+p.name+'. Response within 24h.','success');};
ACTIONS['mktViewApps']=()=>{closeModal();if(state.session.activeRole==='visitor')state.session.activeRole='client';go('client-applications');};
ACTIONS['mktConcierge']=()=>{openModal('<div class="modal"><div class="modal-head"><h3>'+esc(brand())+' concierge</h3><button class="btn btn-ghost btn-icon" data-close-modal-btn>'+icon('x','ic-18')+'</button></div><div class="modal-body"><p class="mb-3">Complex or multi-jurisdiction case? A '+esc(brand())+' specialist will hand-match you to the right partners and manage the introductions personally.</p><div class="note">'+icon('user','ic-18')+'<div>Best for high-risk sectors, multiple entities, or when you are not sure where to start.</div></div></div><div class="modal-foot"><button class="btn btn-ghost" data-close-modal-btn>Cancel</button><button class="btn btn-primary" data-action="mktConciergeReq">Request concierge review</button></div></div>');};
ACTIONS['mktConciergeReq']=()=>{ensureMkt();state.applications.unshift({id:'PA-'+String(state.applications.length+1).padStart(3,'0'),providerId:'concierge',providerName:brand()+' Concierge',category:'concierge',status:'sent',createdAt:'2026-06-20',responseBy:'shortly'});persist();closeModal();toast('Concierge requested','A '+brand()+' specialist will reach out shortly.','success');};

/* select-change + keydown routing (for marketplace selects + advisor Enter) */
document.addEventListener('change',e=>{const act=e.target.closest('[data-action]');if(act&&(e.target.tagName==='SELECT'||e.target.type==='checkbox'||e.target.type==='radio')){const fn=ACTIONS[act.dataset.action];if(fn)fn(act,e);}});
document.addEventListener('keydown',e=>{if(e.target.id==='advisor-input'&&e.key==='Enter'){e.preventDefault();ACTIONS['advisorSend']();}});

/* === VIEW DEFINITIONS CONTINUE === */

/* boot */
applyTheme();renderHud();go(state.session.currentViewId||'public-landing');
</script>
</body>
</html>
